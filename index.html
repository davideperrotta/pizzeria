<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzeria - Seleziona Pizze</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .order-form {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .pizza-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .pizza-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid transparent;
        }

        .pizza-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .pizza-card.selected {
            border-color: #ff6b6b;
            background: #fff5f5;
        }

        .pizza-header {
            background: linear-gradient(135deg, #f8b500 0%, #fceabb 100%);
            padding: 20px;
            color: #333;
        }

        .pizza-name {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .pizza-price {
            font-size: 1.2em;
            color: #d63031;
            font-weight: bold;
        }

        .pizza-body {
            padding: 20px;
        }

        .ingredients {
            color: #666;
            margin-bottom: 15px;
            font-style: italic;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .quantity-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.3s;
        }

        .quantity-btn:hover {
            background: #ee5a24;
        }

        .quantity-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .quantity {
            font-size: 1.1em;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .cart-summary {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 20px;
            min-width: 300px;
            z-index: 1000;
        }

        .cart-header {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-total {
            font-size: 1.3em;
            font-weight: bold;
            color: #d63031;
            margin: 15px 0;
            text-align: right;
        }

        .btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.3s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .nav-link {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            color: #ff6b6b;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .nav-link:hover {
            transform: translateY(-2px);
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
            display: none;
        }
    </style>
</head>
<body>
    <a href="/orders.html" class="nav-link">Vedi Ordini</a>
    
    <div class="container">
        <header>
            <h1>🍕 Pizzeria Deliziosa</h1>
            <p>Seleziona le tue pizze preferite</p>
        </header>

        <div class="order-form">
            <div class="form-group">
                <label for="customerName">Nome Cliente:</label>
                <input type="text" id="customerName" placeholder="Inserisci il tuo nome">
            </div>
            <div class="success-message" id="successMessage">
                Ordine inviato con successo! Vai alla pagina degli ordini per vedere i dettagli.
            </div>
        </div>

        <div class="pizza-grid" id="pizzaGrid">
            <!-- Le pizze verranno caricate qui dinamicamente -->
        </div>
    </div>

    <div class="cart-summary">
        <div class="cart-header">🛒 Carrello</div>
        <div id="cartItems"></div>
        <div class="cart-total" id="cartTotal">Totale: €0.00</div>
        <button class="btn" id="submitOrder" disabled>Invia Ordine</button>
    </div>

    <script src="api.js"></script>
    <script>
        let pizzas = [];
        let cart = {};

        // Carica le pizze dall'API statica
        async function loadPizzas() {
            try {
                pizzas = await window.pizzaAPI.getPizzas();
                renderPizzas();
            } catch (error) {
                console.error('Errore nel caricamento delle pizze:', error);
            }
        }

        // Renderizza le pizze
        function renderPizzas() {
            const pizzaGrid = document.getElementById('pizzaGrid');
            pizzaGrid.innerHTML = '';

            pizzas.forEach(pizza => {
                const pizzaCard = document.createElement('div');
                pizzaCard.className = 'pizza-card';
                pizzaCard.innerHTML = `
                    <div class="pizza-header">
                        <div class="pizza-name">${pizza.name}</div>
                        <div class="pizza-price">€${pizza.price.toFixed(2)}</div>
                    </div>
                    <div class="pizza-body">
                        <div class="ingredients">${pizza.ingredients.join(', ')}</div>
                        <div class="quantity-control">
                            <button class="quantity-btn" onclick="updateQuantity(${pizza.id}, -1)">-</button>
                            <span class="quantity" id="qty-${pizza.id}">0</span>
                            <button class="quantity-btn" onclick="updateQuantity(${pizza.id}, 1)">+</button>
                        </div>
                    </div>
                `;
                pizzaGrid.appendChild(pizzaCard);
            });
        }

        // Aggiorna la quantità
        function updateQuantity(pizzaId, change) {
            const currentQty = cart[pizzaId] || 0;
            const newQty = Math.max(0, currentQty + change);
            
            if (newQty === 0) {
                delete cart[pizzaId];
            } else {
                cart[pizzaId] = newQty;
            }

            updateUI();
        }

        // Aggiorna l'interfaccia
        function updateUI() {
            // Aggiorna le quantità visualizzate
            pizzas.forEach(pizza => {
                const qtyElement = document.getElementById(`qty-${pizza.id}`);
                const qty = cart[pizza.id] || 0;
                qtyElement.textContent = qty;
                
                // Aggiorna lo stile della card
                const pizzaCard = qtyElement.closest('.pizza-card');
                if (qty > 0) {
                    pizzaCard.classList.add('selected');
                } else {
                    pizzaCard.classList.remove('selected');
                }
            });

            // Aggiorna il carrello
            updateCart();
        }

        // Aggiorna il riepilogo del carrello
        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            const submitOrder = document.getElementById('submitOrder');
            
            let html = '';
            let total = 0;

            Object.entries(cart).forEach(([pizzaId, quantity]) => {
                const pizza = pizzas.find(p => p.id === parseInt(pizzaId));
                if (pizza) {
                    const subtotal = pizza.price * quantity;
                    total += subtotal;
                    html += `
                        <div class="cart-item">
                            <span>${pizza.name} x${quantity}</span>
                            <span>€${subtotal.toFixed(2)}</span>
                        </div>
                    `;
                }
            });

            cartItems.innerHTML = html || '<div style="color: #666; text-align: center;">Carrello vuoto</div>';
            cartTotal.textContent = `Totale: €${total.toFixed(2)}`;

            // Abilita/disabilita il pulsante di invio
            const hasItems = Object.keys(cart).length > 0;
            const hasName = document.getElementById('customerName').value.trim() !== '';
            submitOrder.disabled = !hasItems || !hasName;
        }

        // Invia l'ordine
        async function submitOrder() {
            const customerName = document.getElementById('customerName').value.trim();
            
            if (!customerName || Object.keys(cart).length === 0) {
                return;
            }

            const orderPizzas = [];
            Object.entries(cart).forEach(([pizzaId, quantity]) => {
                const pizza = pizzas.find(p => p.id === parseInt(pizzaId));
                if (pizza) {
                    orderPizzas.push({
                        ...pizza,
                        quantity: quantity
                    });
                }
            });

            try {
                const order = await window.pizzaAPI.createOrder({
                    customerName,
                    pizzas: orderPizzas
                });

                // Mostra messaggio di successo
                document.getElementById('successMessage').style.display = 'block';
                
                // Resetta il form
                document.getElementById('customerName').value = '';
                cart = {};
                updateUI();
                
                // Nascondi il messaggio dopo 3 secondi
                setTimeout(() => {
                    document.getElementById('successMessage').style.display = 'none';
                }, 3000);
            } catch (error) {
                console.error('Errore:', error);
                alert('Errore nell\'invio dell\'ordine');
            }
        }

        // Event listeners
        document.getElementById('customerName').addEventListener('input', updateUI);
        document.getElementById('submitOrder').addEventListener('click', submitOrder);

        // Inizializzazione
        loadPizzas();
    </script>
</body>
</html>
